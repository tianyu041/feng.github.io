<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bigram 情緒網絡圖 — NRC Emotion Lexicon</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 10px 18px 6px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 700;
    color: #1F3864;
    color: #a5c8ff;
    letter-spacing: .3px;
  }
  .header .sub {
    font-size: 11px;
    color: #8b949e;
    margin-top: 2px;
  }

  /* ── Controls bar ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 7px 18px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .ctrl-group label {
    font-size: 11.5px;
    color: #8b949e;
    white-space: nowrap;
  }
  .ctrl-group input[type=range] {
    width: 110px;
    accent-color: #58a6ff;
    cursor: pointer;
  }
  .ctrl-group span.val {
    font-size: 11px;
    color: #58a6ff;
    min-width: 36px;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 5px 18px;
    background: #0d1117;
    border-bottom: 1px solid #21262d;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .legend-title {
    font-size: 11px;
    font-weight: 600;
    color: #8b949e;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #c9d1d9;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.2);
  }

  /* ── Graph container ── */
  #graph-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  svg#graph {
    width: 100%;
    height: 100%;
    cursor: grab;
    user-select: none;
  }
  svg#graph:active { cursor: grabbing; }

  /* ── Node ── */
  .node circle {
    stroke-width: 1.5px;
    transition: stroke .15s;
  }
  .node text {
    font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    font-weight: 600;
    pointer-events: none;
    dominant-baseline: middle;
    text-anchor: middle;
  }

  /* ── Edge ── */
  .link {
    stroke-opacity: .55;
    fill: none;
  }
  .link-arrow {
    fill: #aaaaaa;
    opacity: .55;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 11px;
    font-size: 12px;
    line-height: 1.6;
    color: #e6edf3;
    pointer-events: none;
    opacity: 0;
    max-width: 260px;
    transition: opacity .12s;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    z-index: 999;
  }
  #tooltip b { color: #79c0ff; }

  /* ── Buttons ── */
  .btn {
    padding: 4px 11px;
    border-radius: 5px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #c9d1d9;
    font-size: 11.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
  }
  .btn:hover { background: #30363d; }

  /* ── Reset hint ── */
  .hint {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 10.5px;
    color: #484f58;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Bigram 情緒網絡圖：評論資料（NRC Emotion Lexicon）</h1>
  <div class="sub">節點顏色/形狀 = NRC 情緒類別 &nbsp;|&nbsp; 節點大小 = 詞對頻率 &nbsp;|&nbsp; 邊顏色/寬度 = 來源詞情緒與共現頻率</div>
</div>

<div class="controls">
  <!-- Repulsion -->
  <div class="ctrl-group">
    <label>🔵 斥力強度</label>
    <input type="range" id="sl-repulsion" min="-2000" max="-30" step="20" value="-350"/>
    <span class="val" id="vl-repulsion">-350</span>
  </div>
  <!-- Link length -->
  <div class="ctrl-group">
    <label>🔗 連結長度</label>
    <input type="range" id="sl-linkdist" min="30" max="400" step="10" value="120"/>
    <span class="val" id="vl-linkdist">120</span>
  </div>
  <!-- Reset layout -->
  <button class="btn" id="btn-reset">🔄 重置佈局</button>
  <!-- Filter by group -->
  <div class="ctrl-group">
    <label>依情緒篩選</label>
    <select id="sel-group" style="background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;padding:3px 8px;font-size:11.5px;cursor:pointer;">
      <option value="all">全部</option>
      <option value="none">none</option>
      <option value="disgust">disgust</option>
      <option value="anticipation">anticipation</option>
    </select>
  </div>
</div>

<div class="legend">
  <span class="legend-title">NRC 情緒類別：</span>
  <span class="legend-item"><span class="legend-dot" style="background:#AAAAAA"></span>none</span>
  <span class="legend-item"><span class="legend-dot" style="background:#7B5E22"></span>disgust</span>
  <span class="legend-item"><span class="legend-dot" style="background:#ED7D31"></span>anticipation</span>
  <span class="legend-item"><span class="legend-dot" style="background:#C00000"></span>anger</span>
  <span class="legend-item"><span class="legend-dot" style="background:#5C2D91"></span>fear</span>
  <span class="legend-item"><span class="legend-dot" style="background:#4472C4"></span>sadness</span>
  <span class="legend-item"><span class="legend-dot" style="background:#FFD700; border-color:#B8860B"></span>joy</span>
  <span class="legend-item"><span class="legend-dot" style="background:#548235"></span>trust</span>
  <span class="legend-item"><span class="legend-dot" style="background:#00B0F0"></span>surprise</span>
  <span style="margin-left:8px; font-size:11px; color:#8b949e;">⭐ = 高頻詞（星形節點）</span>
</div>

<div id="graph-wrap">
  <svg id="graph"></svg>
  <div class="hint">左鍵拖拽節點 | 空白處拖動畫布 | 滾輪縮放</div>
</div>
<div id="tooltip"></div>

情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "鬼", "target": "打", "value": 1.085794548011336, "title": "鬼 → 打<br>共現 29 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "1", "target": "1", "value": 1, "title": "1 → 1<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "一直", "target": "改", "value": 1, "title": "一直 → 改<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "內", "target": "文", "value": 1, "title": "內 → 文<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "希望", "target": "官方", "value": 1, "title": "希望 → 官方<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "根本", "target": "沒有", "value": 1, "title": "根本 → 沒有<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "直接", "target": "消失", "value": 1, "title": "直接 → 消失<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "看", "target": "影片", "value": 1, "title": "看 → 影片<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "突然", "target": "出現", "value": 1, "title": "突然 → 出現<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "群", "target": "安全", "value": 1, "title": "群 → 安全<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "裁", "target": "切", "value": 1, "title": "裁 → 切<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}, {"source": "訊息", "target": "通知", "value": 1, "title": "訊息 → 通知<br>共現 28 次<br>情緒來源：⬜ none", "color": "#AAAAAA"}];

// Group colour map
const groupColor = {
  none:        '#AAAAAA',
  disgust:     '#7B5E22',
  anticipation:'#ED7D31',
  anger:       '#C00000',
  fear:        '#5C2D91',
  sadness:     '#4472C4',
  joy:         '#FFD700',
  trust:       '#548235',
  surprise:    '#00B0F0',
};
const groupBorder = {
  none:        '#888888',
  disgust:     '#5A4010',
  anticipation:'#A85000',
  anger:       '#7B0000',
  fear:        '#3A1A6E',
  sadness:     '#2E4F8A',
  joy:         '#B8860B',
  trust:       '#2E5018',
  surprise:    '#007AAA',
};

// Value ranges from R output
const nodeValMin = 15, nodeValMax = 55;
const edgeValMin = 1,  edgeValMax = 10;

function nodeRadius(v) {
  return 5 + (v - nodeValMin) / (nodeValMax - nodeValMin) * 22;
}
function edgeWidth(v) {
  return 0.5 + (v - edgeValMin) / (edgeValMax - edgeValMin) * 6;
}
function fontSize(v) {
  return 8 + (v - nodeValMin) / (nodeValMax - nodeValMin) * 6;
}

// ═══════════════════════════════════════════════════
//  SVG SETUP
// ═══════════════════════════════════════════════════
const svg   = d3.select('#graph');
const wrap  = document.getElementById('graph-wrap');
const W = () => wrap.clientWidth;
const H = () => wrap.clientHeight;

// Arrow marker
const defs = svg.append('defs');
defs.append('marker')
  .attr('id','arrow')
  .attr('viewBox','0 -4 10 8')
  .attr('refX', 10)
  .attr('refY', 0)
  .attr('markerWidth', 6)
  .attr('markerHeight', 6)
  .attr('orient','auto')
  .append('path')
    .attr('d','M0,-4L10,0L0,4')
    .attr('fill','#aaaaaa')
    .attr('opacity',.55);

// Zoom behaviour
const zoom = d3.zoom()
  .scaleExtent([0.08, 8])
  .on('zoom', (event) => {
    g.attr('transform', event.transform);
  });
svg.call(zoom);

// Background drag (pan) — handled by d3 zoom automatically
// Click-on-background de-selects
svg.on('click', function(event) {
  if (event.target === this || event.target.tagName === 'svg') clearHighlight();
});

const g = svg.append('g').attr('class','graph-root');
const gLinks = g.append('g').attr('class','links');
const gNodes = g.append('g').attr('class','nodes');

// ═══════════════════════════════════════════════════
//  BUILD NODES / EDGES
// ═══════════════════════════════════════════════════
let nodes = rawNodes.map(d => ({
  ...d,
  r: nodeRadius(d.value),
  fsize: fontSize(d.value),
  fill: groupColor[d.group] || '#AAAAAA',
  stroke: groupBorder[d.group] || '#888888',
  star: d.value > 35,   // large nodes get star shape
}));

let edges = rawEdges.map(d => ({
  ...d,
  w: edgeWidth(d.value),
}));

// Index nodes by id
const nodeById = {};
nodes.forEach(n => nodeById[n.id] = n);

// Resolve source/target references (strings → objects)
const linksResolved = edges.map(e => ({
  ...e,
  source: nodeById[e.source] || e.source,
  target: nodeById[e.target] || e.target,
}));

// ═══════════════════════════════════════════════════
//  SIMULATION
// ═══════════════════════════════════════════════════
let repulsion = -350;
let linkDist  = 120;

const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(linksResolved)
    .id(d => d.id)
    .distance(linkDist)
    .strength(0.4))
  .force('charge', d3.forceManyBody().strength(repulsion))
  .force('center', d3.forceCenter(0, 0))
  .force('collision', d3.forceCollide().radius(d => d.r + 3))
  .alphaDecay(0.028)
  .velocityDecay(0.4);

// ═══════════════════════════════════════════════════
//  RENDER LINKS
// ═══════════════════════════════════════════════════
const link = gLinks.selectAll('.link')
  .data(linksResolved)
  .join('line')
    .attr('class','link')
    .attr('stroke', d => d.color || '#AAAAAA')
    .attr('stroke-width', d => d.w)
    .attr('marker-end','url(#arrow)');

// ═══════════════════════════════════════════════════
//  RENDER NODES
// ═══════════════════════════════════════════════════
const nodeG = gNodes.selectAll('.node')
  .data(nodes)
  .join('g')
    .attr('class','node')
    .style('cursor','grab')
    .call(drag(simulation))
    .on('click', nodeClick)
    .on('mouseover', nodeOver)
    .on('mouseout', nodeOut);

// Draw circle (or star polygon for high-freq nodes)
nodeG.each(function(d) {
  const g = d3.select(this);
  if (d.star) {
    g.append('polygon')
      .attr('points', starPoints(d.r * 1.1, d.r * 0.48, 5))
      .attr('fill', d.fill)
      .attr('stroke', d.stroke)
      .attr('stroke-width', 1.5);
  } else {
    g.append('circle')
      .attr('r', d.r)
      .attr('fill', d.fill)
      .attr('stroke', d.stroke)
      .attr('stroke-width', 1.5);
  }
  // Label
  const brightness = hexBrightness(d.fill);
  g.append('text')
    .attr('fill', brightness > 140 ? '#1F3864' : '#ffffff')
    .attr('font-size', d.fsize)
    .attr('stroke', brightness > 140 ? 'rgba(255,255,255,.4)' : 'rgba(0,0,0,.4)')
    .attr('stroke-width', 2.5)
    .attr('paint-order','stroke')
    .text(d.label);
});

// ═══════════════════════════════════════════════════
//  TICK
// ═══════════════════════════════════════════════════
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => edgeTipX(d))
    .attr('y2', d => edgeTipY(d));

  nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
});

// ═══════════════════════════════════════════════════
//  FIT TO VIEW (initial)
// ═══════════════════════════════════════════════════
simulation.on('end.fit', () => {
  fitView();
  simulation.on('end.fit', null);
});

// If simulation ends quickly, fit anyway
setTimeout(() => {
  if (simulation.alpha() < 0.05) fitView();
}, 3000);

function fitView() {
  const bounds = g.node().getBBox();
  if (!bounds.width || !bounds.height) return;
  const ww = W(), wh = H();
  const scale = Math.min(ww / (bounds.width + 80), wh / (bounds.height + 80), 2) * 0.9;
  const tx = ww/2 - scale*(bounds.x + bounds.width/2);
  const ty = wh/2 - scale*(bounds.y + bounds.height/2);
  svg.transition().duration(700)
    .call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

// ═══════════════════════════════════════════════════
//  DRAG
// ═══════════════════════════════════════════════════
function drag(sim) {
  return d3.drag()
    .on('start', (event, d) => {
      if (!event.active) sim.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
      event.sourceEvent.stopPropagation();
    })
    .on('drag', (event, d) => {
      d.fx = event.x; d.fy = event.y;
    })
    .on('end', (event, d) => {
      if (!event.active) sim.alphaTarget(0);
      d.fx = null; d.fy = null;
    });
}

// ═══════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');

function nodeOver(event, d) {
  tooltip.innerHTML = d.title.replace(/<b[^>]*>/g,'<b>').replace(/<\/b>/g,'</b>');
  tooltip.style.opacity = 1;
  moveTooltip(event);
  // Highlight connected
  const connected = new Set([d.id]);
  linksResolved.forEach(e => {
    if (e.source.id === d.id) connected.add(e.target.id);
    if (e.target.id === d.id) connected.add(e.source.id);
  });
  nodeG.style('opacity', n => connected.has(n.id) ? 1 : 0.12);
  link.style('opacity', e => (e.source.id === d.id || e.target.id === d.id) ? 0.9 : 0.04);
}

function nodeOut() {
  tooltip.style.opacity = 0;
  clearHighlight();
}

function nodeClick(event, d) {
  event.stopPropagation();
  tooltip.innerHTML = d.title.replace(/<b[^>]*>/g,'<b>').replace(/<\/b>/g,'</b>');
  tooltip.style.opacity = 1;
  moveTooltip(event);
}

svg.on('mousemove.tt', (event) => {
  if (tooltip.style.opacity === '1') moveTooltip(event);
});

function moveTooltip(event) {
  let x = event.clientX + 14, y = event.clientY - 10;
  if (x + 280 > window.innerWidth) x = event.clientX - 270;
  if (y + 120 > window.innerHeight) y = event.clientY - 120;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function clearHighlight() {
  nodeG.style('opacity', 1);
  link.style('opacity', .55);
  tooltip.style.opacity = 0;
}

// ═══════════════════════════════════════════════════
//  SLIDERS
// ═══════════════════════════════════════════════════
document.getElementById('sl-repulsion').addEventListener('input', function() {
  repulsion = +this.value;
  document.getElementById('vl-repulsion').textContent = repulsion;
  simulation.force('charge', d3.forceManyBody().strength(repulsion));
  simulation.alpha(0.4).restart();
});

document.getElementById('sl-linkdist').addEventListener('input', function() {
  linkDist = +this.value;
  document.getElementById('vl-linkdist').textContent = linkDist;
  simulation.force('link').distance(linkDist);
  simulation.alpha(0.4).restart();
});

// ═══════════════════════════════════════════════════
//  RESET LAYOUT
// ═══════════════════════════════════════════════════
document.getElementById('btn-reset').addEventListener('click', () => {
  nodes.forEach(d => {
    d.x = (Math.random() - 0.5) * 800;
    d.y = (Math.random() - 0.5) * 600;
    d.vx = 0; d.vy = 0;
    d.fx = null; d.fy = null;
  });
  simulation.alpha(1).restart();
  setTimeout(fitView, 2500);
});

// ═══════════════════════════════════════════════════
//  GROUP FILTER
// ═══════════════════════════════════════════════════
document.getElementById('sel-group').addEventListener('change', function() {
  const grp = this.value;
  if (grp === 'all') {
    nodeG.style('display', null);
    link.style('display', null);
  } else {
    const visible = new Set(nodes.filter(n => n.group === grp).map(n => n.id));
    nodeG.style('display', d => visible.has(d.id) ? null : 'none');
    link.style('display', e => (visible.has(e.source.id) && visible.has(e.target.id)) ? null : 'none');
  }
});

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function starPoints(outerR, innerR, points) {
  const coords = [];
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (Math.PI / points) * i - Math.PI / 2;
    coords.push(`${r * Math.cos(angle)},${r * Math.sin(angle)}`);
  }
  return coords.join(' ');
}

function hexBrightness(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return 0.299*r + 0.587*g + 0.114*b;
}

function edgeTipX(d) {
  const dx = d.target.x - d.source.x;
  const dy = d.target.y - d.source.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  return d.target.x - (dx / dist) * (d.target.r + 8);
}
function edgeTipY(d) {
  const dx = d.target.x - d.source.x;
  const dy = d.target.y - d.source.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  return d.target.y - (dy / dist) * (d.target.r + 8);
}

// Resize
window.addEventListener('resize', () => {
  simulation.force('center', d3.forceCenter(0, 0));
});

// Initial centre
simulation.force('center', d3.forceCenter(0, 0));
simulation.alpha(1).restart();

// Set initial positions from R layout
nodes.forEach(d => {
  d.x = d.x * 400;
  d.y = d.y * 300;
});
</script>

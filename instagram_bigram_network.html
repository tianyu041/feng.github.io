function buildGraph(charge, dist) {  if (sim) sim.stop();  g.selectAll("*").remove();  const nodes = nodesData.map(d => Object.assign({}, d));  const links = linksData.map(d => Object.assign({}, d));  linkSel = g.append("g").selectAll("line")    .data(links).join("line")    .attr("stroke",         d => EDGE_COLORS[d.sentiment] || EDGE_COLORS.neutral)    .attr("stroke-opacity", 0.38)    .attr("stroke-width",   d => wScale(d.value));  nodeSel = g.append("g").selectAll("g.node")    .data(nodes).join("g")    .attr("class", "node")    .style("cursor", "grab")    .call(d3.drag()      .on("start", (e, d) => {        if (!e.active) sim.alphaTarget(0.3).restart();        d.fx = d.x; d.fy = d.y;        e.sourceEvent.currentTarget.style.cursor = "grabbing";      })      .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })      .on("end",   (e, d) => {        if (!e.active) sim.alphaTarget(0);        d.fx = null; d.fy = null;        e.sourceEvent.currentTarget.style.cursor = "grab";      })    )    .on("mouseover", (e, d) => {      const tip = document.getElementById("tooltip");      const cnt = linksData.filter(l => {        const s = typeof l.source === "object" ? l.source.id : l.source;        const t = typeof l.target === "object" ? l.target.id : l.target;        return s === d.id || t === d.id;      }).length;      const sLabel = d.sentiment === "positive" ? "正面" : d.sentiment === "negative" ? "負面" : "中性";      const sCol   = d.sentiment === "positive" ? "#d85a30"     : d.sentiment === "negative" ? "#0f6e56"     : "#534ab7";      tip.innerHTML =        "<b>" + d.id + "</b> " +        "<span style=\"background:" + sCol + ";color:#fff;font-size:10px;padding:1px 6px;border-radius:4px\">" + sLabel + "</span>" +        "<br>共現頻率：" + d.freq +        "<br>連接詞數：" + cnt;      tip.style.opacity = 1;      tip.style.left = (e.clientX + 14) + "px";      tip.style.top  = (e.clientY - 44) + "px";      highlight(d.id);    })    .on("mousemove", e => {      const tip = document.getElementById("tooltip");      tip.style.left = (e.clientX + 14) + "px";      tip.style.top  = (e.clientY - 44) + "px";    })    .on("mouseout", () => {      document.getElementById("tooltip").style.opacity = 0;      resetHighlight();    });  nodeSel.append("circle")    .attr("r",            d => rScale(d.freq))    .attr("fill",         d => nodeColor(d))    .attr("fill-opacity", 0.86)    .attr("stroke",       "#fff")    .attr("stroke-width", 1.5);  nodeSel.append("text")    .text(d => d.id)    .attr("text-anchor",       "middle")    .attr("dominant-baseline", "central")    .attr("fill",              "#fff")    .attr("fill-opacity",      1)    .attr("font-size",         d => Math.max(8, Math.min(13, rScale(d.freq) * 0.65)) + "px")    .attr("font-weight",       "600")    .attr("pointer-events",    "none");  sim = d3.forceSimulation(nodes)    .force("link",      d3.forceLink(links).id(d => d.id).distance(dist).strength(0.5))    .force("charge",    d3.forceManyBody().strength(charge).distanceMax(430))    .force("center",    d3.forceCenter(W() / 2, H() / 2))    .force("collision", d3.forceCollide(d => rScale(d.freq) + 6))    .on("tick", () => {      linkSel        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);      nodeSel.attr("transform", d => "translate(" + d.x + "," + d.y + ")");    });}
function resetLayout() {  buildGraph(    +document.getElementById("repulsion").value,    +document.getElementById("linklen").value  );  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);}document.getElementById("repulsion").addEventListener("input", function() {  document.getElementById("rep-val").textContent = Math.abs(this.value);  sim.force("charge", d3.forceManyBody().strength(+this.value).distanceMax(430));  sim.alpha(0.4).restart();});document.getElementById("linklen").addEventListener("input", function() {  document.getElementById("len-val").textContent = this.value;  sim.force("link").distance(+this.value);  sim.alpha(0.4).restart();});buildGraph(-320, 85);window.resetLayout = resetLayout;
</script></body></html>

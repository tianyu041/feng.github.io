function nodeColor(d) {
  const t = d.freq / maxFreq;
  const r = COLORS[d.sentiment] || COLORS.neutral;
  if      (t > 0.60) return r[0];
  else if (t > 0.30) return r[1];
  else if (t > 0.10) return r[2];

}

  linksData.forEach(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    if (s === hovId) nb.add(t);
    if (t === hovId) nb.add(s);
  });

  nodeSel.select("circle")
    .attr("fill-opacity", d => nb.has(d.id) ? 0.95 : 0.08)
    .attr("stroke",       d => d.id === hovId
                                 ? (HOVER_STROKE[d.sentiment] || "#1f1876")
                                 : "#fff")
    .attr("stroke-width", d => d.id === hovId ? 3 : 1.5);

  nodeSel.select("text")
    .attr("fill-opacity", d => nb.has(d.id) ? 1 : 0.10);

  linkSel
    .attr("stroke", d => {
      const s = typeof d.source === "object" ? d.source.id : d.source;
      const t = typeof d.target === "object" ? d.target.id : d.target;
      return (s === hovId || t === hovId)
        ? (EDGE_COLORS[d.sentiment] || EDGE_COLORS.neutral)
        : "#ccc";
    })
    .attr("stroke-opacity", d => {
      const s = typeof d.source === "object" ? d.source.id : d.source;
      const t = typeof d.target === "object" ? d.target.id : d.target;
      return (s === hovId || t === hovId) ? 0.92 : 0.05;
    })
    .attr("stroke-width", d => {
      const s = typeof d.source === "object" ? d.source.id : d.source;
      const t = typeof d.target === "object" ? d.target.id : d.target;
      return (s === hovId || t === hovId) ? wScale(d.value) * 2 : wScale(d.value);
    });
}

function resetHighlight() {
  nodeSel.select("circle")
    .attr("fill-opacity", 0.88)
    .attr("stroke",       "#fff")
    .attr("stroke-width", 1.5);
  nodeSel.select("text").attr("fill-opacity", 1);
  linkSel
    .attr("stroke",         d => EDGE_COLORS[d.sentiment] || EDGE_COLORS.neutral)
    .attr("stroke-opacity", 0.35)
    .attr("stroke-width",   d => wScale(d.value));
}

// ============================================================
// BUILD GRAPH
// ============================================================
function buildGraph(charge, dist) {
  if (sim) sim.stop();
  g.selectAll("*").remove();

  const nodes = nodesData.map(d => Object.assign({}, d));
  const links = linksData.map(d => Object.assign({}, d));

  // Edges
  linkSel = g.append("g")
    .attr("class", "links")
    .selectAll("line")
    .data(links).join("line")
    .attr("stroke",         d => EDGE_COLORS[d.sentiment] || EDGE_COLORS.neutral)
    .attr("stroke-opacity", 0.35)
    .attr("stroke-width",   d => wScale(d.value))
    .attr("stroke-linecap", "round");

  // Nodes
  nodeSel = g.append("g")
    .attr("class", "nodes")
    .selectAll("g.node")
    .data(nodes).join("g")
    .attr("class", "node")
    .style("cursor", "grab")
    .call(d3.drag()
      .on("start", (e, d) => {
        if (!e.active) sim.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
        e.sourceEvent.currentTarget.style.cursor = "grabbing";
      })
      .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end",   (e, d) => {
        if (!e.active) sim.alphaTarget(0);
        d.fx = null; d.fy = null;
        e.sourceEvent.currentTarget.style.cursor = "grab";
      })
    )
    .on("mouseover", (e, d) => {
      const tip = document.getElementById("tooltip");
      const cnt = linksData.filter(l => {
        const s = typeof l.source === "object" ? l.source.id : l.source;
        const t = typeof l.target === "object" ? l.target.id : l.target;
        return s === d.id || t === d.id;
      }).length;
      const sentMap = { positive:"\u6b63\u9762", neutral:"\u4e2d\u6027", negative:"\u8ca0\u9762" };
      const colMap  = { positive:"#d85a30", neutral:"#4a3fbb", negative:"#0f6e56" };
      const sLabel  = sentMap[d.sentiment]  || "\u4e2d\u6027";
      const sCol    = colMap[d.sentiment]   || "#4a3fbb";
      tip.innerHTML =
        "<b>" + d.id + "</b>" +
        "&nbsp;<span style='background:" + sCol + ";color:#fff;font-size:10px;" +
        "padding:1px 7px;border-radius:4px;font-weight:600'>" + sLabel + "</span>" +
        "<br>\u5171\u73fe\u983b\u7387\uff1a<b>" + d.freq.toLocaleString() + "</b>" +
        "<br>\u9023\u63a5\u8a5e\u6578\uff1a" + cnt;
      tip.style.opacity = 1;
      tip.style.left = (e.clientX + 15) + "px";
      tip.style.top  = (e.clientY - 48) + "px";
      highlight(d.id);
    })
    .on("mousemove", e => {
      const tip = document.getElementById("tooltip");
      tip.style.left = (e.clientX + 15) + "px";
      tip.style.top  = (e.clientY - 48) + "px";
    })
    .on("mouseout", () => {
      document.getElementById("tooltip").style.opacity = 0;
      resetHighlight();
    });

  nodeSel.append("circle")
    .attr("r",            d => rScale(d.freq))
    .attr("fill",         d => nodeColor(d))
    .attr("fill-opacity", 0.88)
    .attr("stroke",       "#fff")
    .attr("stroke-width", 1.5);

  nodeSel.append("text")
    .text(d => d.id)
    .attr("text-anchor",       "middle")
    .attr("dominant-baseline", "central")
    .attr("fill",              "#fff")
    .attr("fill-opacity",      1)
    .attr("font-size",         d => Math.max(8, Math.min(13, rScale(d.freq) * 0.62)) + "px")
    .attr("font-weight",       "700")
    .attr("pointer-events",    "none");

  sim = d3.forceSimulation(nodes)
    .force("link",      d3.forceLink(links).id(d => d.id).distance(dist).strength(0.5))
    .force("charge",    d3.forceManyBody().strength(charge).distanceMax(480))
    .force("center",    d3.forceCenter(W() / 2, H() / 2))
    .force("collision", d3.forceCollide(d => rScale(d.freq) + 7))
    .on("tick", () => {
      linkSel
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeSel.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
    });
}

// ============================================================
// CONTROLS
// ============================================================
function resetLayout() {
  buildGraph(
    +document.getElementById("repulsion").value,
    +document.getElementById("linklen").value
  );
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
}

document.getElementById("repulsion").addEventListener("input", function () {
  document.getElementById("rep-val").textContent = Math.abs(this.value);
  sim.force("charge", d3.forceManyBody().strength(+this.value).distanceMax(480));
  sim.alpha(0.4).restart();
});

document.getElementById("linklen").addEventListener("input", function () {
  document.getElementById("len-val").textContent = this.value;
  sim.force("link").distance(+this.value);
  sim.alpha(0.4).restart();
});

window.resetLayout = resetLayout;

// ── Initial render ────────────────────────────────────────────
buildGraph(-320, 90);
</script>
</body>
</html>
